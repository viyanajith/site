<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Encoder / Decoder</title>
<style>
  :root { --bg:#0d0f14; --panel:#161a23; --neon:#39ff14; --text:#e6e6e6; --dim:#8a93a6; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text);
         font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
         display:flex; flex-direction:column; align-items:center; padding:32px 16px; }
  h1 { color:var(--neon); letter-spacing:2px; font-size:1.4rem; margin:0 0 4px; }
  .sub { color:var(--dim); font-size:.8rem; margin-bottom:24px; }
  .card { background:var(--panel); border:1px solid #232838; border-radius:12px;
          padding:20px; width:100%; max-width:560px; }
  label { display:block; color:var(--dim); font-size:.75rem; text-transform:uppercase;
          letter-spacing:1px; margin:14px 0 6px; }
  textarea { width:100%; min-height:110px; resize:vertical; background:#0d0f14;
             color:var(--text); border:1px solid #2a3145; border-radius:8px;
             padding:10px; font:inherit; font-size:.9rem; }
  textarea:focus { outline:none; border-color:var(--neon); }
  .btns { display:flex; gap:10px; margin-top:14px; }
  button { flex:1; background:transparent; color:var(--neon); border:1px solid var(--neon);
           border-radius:8px; padding:10px; font:inherit; font-weight:bold; cursor:pointer;
           letter-spacing:1px; transition:.15s; }
  button:hover:not(:disabled) { background:var(--neon); color:#0d0f14; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  #status { margin-top:14px; font-size:.78rem; color:var(--dim); text-align:center; }
  #status.ready { color:var(--neon); }
  #status.error { color:#ff5470; }
  .copy { margin-top:8px; width:100%; }
</style>
</head>
<body>
  <h1>★ ENCODER / DECODER ★</h1>
  <div class="sub">position-shift cipher &middot; runs your Python in the browser</div>

  <div class="card">
    <label for="input">Text</label>
    <textarea id="input" placeholder="Type or paste text here&hellip;"></textarea>

    <div class="btns">
      <button id="encodeBtn" disabled>ENCODE</button>
      <button id="decodeBtn" disabled>DECODE</button>
    </div>

    <label for="output">Result</label>
    <textarea id="output" readonly placeholder="Result appears here&hellip;"></textarea>
    <button id="copyBtn" class="copy" disabled>COPY RESULT</button>

    <div id="status">Booting&hellip;</div>
  </div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
  const $ = id => document.getElementById(id);
  const statusEl = $('status');
  function setStatus(msg, kind = '') { statusEl.textContent = msg; statusEl.className = kind; }

  let pyodide, processFn;

  // Load Pyodide (Python-in-the-browser), then load encoder.py and grab process()
  async function boot() {
    try {
      setStatus('Loading Python… (first visit can take ~10s)');
      pyodide = await loadPyodide();
      const code = await (await fetch('encoder.py')).text();
      pyodide.runPython(code);
      processFn = pyodide.globals.get('process');
      $('encodeBtn').disabled = false;
      $('decodeBtn').disabled = false;
      setStatus('Ready ✓', 'ready');
    } catch (err) {
      setStatus('Failed to load: ' + err, 'error');
    }
  }

  // Calls the Python process(text, mode) and shows the result
  function run(mode) {
    try {
      const result = processFn($('input').value, mode);
      $('output').value = result;
      $('copyBtn').disabled = result.length === 0;
      setStatus((mode === 'encode' ? 'Encoded' : 'Decoded') + ' ✓', 'ready');
    } catch (err) {
      setStatus('Error: ' + err, 'error');
    }
  }

  $('encodeBtn').addEventListener('click', () => run('encode'));
  $('decodeBtn').addEventListener('click', () => run('decode'));
  $('copyBtn').addEventListener('click', async () => {
    await navigator.clipboard.writeText($('output').value);
    setStatus('Copied to clipboard ✓', 'ready');
  });

  boot();
</script>
</body>
</html>
