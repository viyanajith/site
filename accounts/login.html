<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log In · Viyanajith</title>
<style>
  :root { --bg:#05060a; --panel:#10131c; --neon:#00f0ff; --pink:#ff3df0; --text:#e6e6e6; --dim:#7c8599; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text);
         font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
         display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  .card { background:var(--panel); border:1px solid #1f2433; border-radius:14px;
          padding:28px; width:100%; max-width:360px; }
  h1 { color:var(--neon); letter-spacing:.18em; font-size:1.2rem; margin:0 0 4px; }
  .sub { color:var(--dim); font-size:.75rem; margin-bottom:20px; }
  label { display:block; color:var(--dim); font-size:.7rem; text-transform:uppercase;
          letter-spacing:.1em; margin:14px 0 6px; }
  input { width:100%; background:#05060a; color:var(--text);
          border:1px solid #2a3145; border-radius:8px; padding:10px; font:inherit; font-size:.9rem; }
  input:focus { outline:none; border-color:var(--neon); }
  .pw-wrap { position:relative; }
  .pw-wrap input { padding-right:46px; }
  .pw-toggle {
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    cursor:pointer; font-size:.62rem; letter-spacing:.08em; text-transform:uppercase;
    color:var(--dim); user-select:none;
  }
  .pw-toggle:hover { color:var(--text); }
  button { width:100%; margin-top:20px; background:transparent; color:var(--neon);
           border:1px solid var(--neon); border-radius:8px; padding:11px; font:inherit;
           font-weight:bold; letter-spacing:.12em; cursor:pointer; transition:.15s; }
  button:hover:not(:disabled) { background:var(--neon); color:#000; box-shadow:0 0 12px var(--neon); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .links { margin-top:16px; font-size:.78rem; text-align:center; color:var(--dim); }
  .links a { color:var(--neon); text-decoration:none; }
  .links a:hover { text-decoration:underline; }
  #msg { margin-top:14px; font-size:.78rem; text-align:center; color:var(--pink); min-height:1em; }
  #msg.ok { color:var(--neon); }
</style>
</head>
<body>
  <div class="card">
    <h1>LOG IN</h1>
    <div class="sub">Welcome back.</div>

    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="your username" autocomplete="username">

      <label for="password">Password</label>
      <div class="pw-wrap">
        <input id="password" type="password" placeholder="your password" autocomplete="current-password">
        <span class="pw-toggle" data-target="password">show</span>
      </div>

      <button type="submit" id="submitBtn">LOG IN</button>
    </form>

    <div id="msg"></div>

    <div class="links">
      No account? <a href="signup.html">Sign up</a><br>
      <a href="../index.html">&larr; Back to site</a>
    </div>
  </div>

<script type="module">
  import { auth, usernameToEmail } from "./firebase-init.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  const $ = id => document.getElementById(id);
  const msg = $('msg');
  function show(text, ok = false) { msg.textContent = text; msg.className = ok ? 'ok' : ''; }

  $('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = $('username').value.trim();
    const password = $('password').value;
    if (!username || !password) { show('Enter your username and password.'); return; }

    $('submitBtn').disabled = true;
    show('Logging in…', true);
    try {
      await signInWithEmailAndPassword(auth, usernameToEmail(username), password);
      window.location.href = 'account.html';
    } catch (err) {
      $('submitBtn').disabled = false;
      if (['auth/invalid-credential', 'auth/wrong-password', 'auth/user-not-found']
            .includes(err.code)) {
        show('Wrong username or password.');
      } else if (err.code === 'auth/network-request-failed') {
        show('Network error — check your connection.');
      } else {
        show('Error: ' + (err.code || err.message));
      }
    }
  });

  // Show / hide password toggle
  document.querySelectorAll('.pw-toggle').forEach(t => {
    t.addEventListener('click', () => {
      const inp = document.getElementById(t.dataset.target);
      const showing = inp.type === 'password';
      inp.type = showing ? 'text' : 'password';
      t.textContent = showing ? 'hide' : 'show';
    });
  });
</script>
</body>
</html>
